spring.application.name=RewardedQuestionsApp

server.port=8080

# ---------- DB ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/rewarded_questions_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ---------- Hibernate ------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- JWT ----------
app.security.secret-key=${JWT_SECRET}
app.security.jwt-expiration=10800000

allowed.origins=http://localhost:5173,http://localhost:3000,https://coding-factory.apps.gov.gr
